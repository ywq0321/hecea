<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - HECEA</title>
    <meta name="description" content="Learn about HECEA's organization structure, leadership team, and policies">
    
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/babel.min.js"></script>
    <script src="vendor/tailwindcss.js"></script>
    <link href="vendor/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #1e40af;
            --primary-light: #e0e7ff;
            --secondary-color: #dc2626;
            --accent-color: #f59e0b;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --bg-light: #f8fafc;
            --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    }

    @layer components {
        .btn-primary {
            @apply px-6 py-3 bg-[var(--primary-color)] text-white rounded-lg font-medium hover:opacity-90 transition-all duration-200;
        }
        
        .card {
            @apply bg-white rounded-xl p-6 shadow-[var(--shadow-soft)] hover:shadow-lg transition-shadow duration-200;
        }
        
        .section-padding {
            @apply py-16 px-4 sm:px-6 lg:px-8;
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="utils/trickle-mock.js"></script>
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="components/AboutSections.js"></script>
    <script type="text/babel" src="utils/auth.js"></script>
    <script type="text/babel" src="about-app.js"></script>
</body>
</html>
